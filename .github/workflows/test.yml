name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Lint
        if: matrix.python-version == '3.12'
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        if: matrix.python-version == '3.12'
        run: uv run mypy homecom_alt

      - name: Test
        run: uv run pytest --timeout=30 --cov=homecom_alt --cov-report=xml --error-for-skips

      - name: Coverage check
        if: matrix.python-version == '3.12'
        run: uv run coverage report --fail-under=40
